name: Update Latency Data
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4  # Updated to fix the warning

      - name: Set up Python
        uses: actions/setup-python@v5 # Updated to fix the warning
        with:
          python-version: '3.x'

      - name: Run Latency Monitor
        run: python Dashboard_test.py # Ensure your script is named exactly this in your repo

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add latency_data.json latency_history.csv alerts.json
          git commit -m "Automated update of latency data and alerts" || echo "No changes to commit"
          git push
