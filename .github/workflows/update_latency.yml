name: Update Latency Data
on:
  schedule:
    - cron: '0 * * * *' # Runs at the top of every hour
  workflow_dispatch:      # Allows you to run it manually whenever you want

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Run Latency Monitor
        run: python dashboard_test.py

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add latency_data.json
          git commit -m "Automated update of latency data"
          git push
