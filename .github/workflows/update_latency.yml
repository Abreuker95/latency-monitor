name: Update Latency Data
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies 
        run: pip install requests

      - name: Run Latency Monitor Engine
        run: python Dashboard_test.py

      - name: Run AI Log Analysis Engine
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }} # <--- ADDED HERE
        run: python analyze_logs.py

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add latency_data.json latency_history.csv alerts.json ai_report.json
          git commit -m "Automated update of latency, alerts, and AI report" || echo "No changes to commit"
          git push
